<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- 洗練されたモダンなオレンジの背景 -->
  <rect x="0" y="0" width="100" height="100" rx="24" fill="#F05A28" />

  <!-- 参考画像を忠実に再現した若葉（芽） -->
  <g fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- 外側の輪郭と茎（しっかりとした太さ 8） -->
    <g stroke-width="8">
      <!-- 垂直にすっと伸びる中心の茎 -->
      <path d="M 50 53 L 50 83" />

      <!-- 左の葉の美しいふくらみと輪郭 -->
      <path d="M 50 53 C 38 57, 16 51, 12 31 C 8 15, 32 15, 50 53" />

      <!-- 右の葉の美しいふくらみと輪郭 -->
      <path d="M 50 53 C 62 57, 84 51, 88 31 C 92 15, 68 15, 50 53" />
    </g>

    <!-- 葉っぱの中の線（葉脈は主張を抑えて少し細めの 5.5） -->
    <g stroke-width="5.5">
      <!-- 左の葉脈（中央から左上へ斜めに伸びる） -->
      <path d="M 50 53 L 31 36" />

      <!-- 右の葉脈（中央から右上へ斜めに伸びる） -->
      <path d="M 50 53 L 69 36" />
    </g>

  </g>
</svg>