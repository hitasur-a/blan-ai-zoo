<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- 洗練されたモダンなオレンジの背景 -->
  <rect x="0" y="0" width="100" height="100" rx="24" fill="#F05A28" />

  <!-- シンプルを極めたトラック＆ダンボール -->
  <g fill="#FFFFFF">
    
    <!-- 1. 荷台 兼 ダンボール（美しい黄金比の角丸長方形） -->
    <rect x="16" y="28" width="42" height="32" rx="4" />
    
    <!-- ダンボールの十字テープ（背景のオレンジでクリアにくり抜く） -->
    <rect x="34" y="28" width="6" height="32" fill="#F05A28" />
    <rect x="16" y="41" width="42" height="6" fill="#F05A28" />

    <!-- 2. 運転席キャビン -->
    <path d="M 60 34 L 75 34 C 80 34, 84 38, 84 43 L 84 60 L 60 60 Z" />
    
    <!-- 運転席の窓（背景のオレンジでくり抜く） -->
    <path d="M 66 40 L 75 40 C 77 40, 78 41, 78 43 L 78 50 L 66 50 Z" fill="#F05A28" />

    <!-- 3. シャーシ（足回りの土台） -->
    <rect x="16" y="60" width="68" height="4" rx="2" />

    <!-- 4. 後輪タイヤ -->
    <circle cx="31" cy="68" r="9" />
    <circle cx="31" cy="68" r="4.5" fill="#F05A28" />

    <!-- 5. 前輪タイヤ -->
    <circle cx="69" cy="68" r="9" />
    <circle cx="69" cy="68" r="4.5" fill="#F05A28" />

  </g>
</svg>