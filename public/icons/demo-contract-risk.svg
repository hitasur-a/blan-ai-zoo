<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="256" height="256">
  <!-- 背景（知性と信頼感を両立した深めのグレーブルー） -->
  <rect x="0" y="0" width="100" height="100" rx="22" fill="#2D3E50" />

  <!-- 契約書ドキュメント本体（右上ドッグイヤー） -->
  <path d="M 25 24 
           H 50 
           L 63 37 
           V 72 
           C 63 75, 60 77, 57 77 
           H 29 
           C 26 77, 23 75, 23 72 
           V 28 
           C 23 25, 26 24, 29 24 
           Z" fill="#FFFFFF" />

  <!-- 折れ目の境界線（少し細くスッキリと: 3.5px） -->
  <path d="M 50 24 V 37 H 63" fill="none" stroke="#2D3E50" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round" />

  <!-- ドキュメント内の文字バー（少し細くしてモダンに: 4.5px） -->
  <g stroke="#2D3E50" stroke-width="4.5" stroke-linecap="round">
    <line x1="31" y1="41" x2="44" y2="41" />
    <line x1="31" y1="51" x2="53" y2="51" />
    <line x1="31" y1="61" x2="40" y2="61" />
  </g>

  <!-- 重なり部分の「型抜き（切り欠き）」表現（スマートに細め調整: 15.5px） -->
  <path d="M 44 56 L 58 70 L 84 38" fill="none" stroke="#2D3E50" stroke-width="15.5" stroke-linecap="round" stroke-linejoin="round" />

  <!-- チェックマーク（少しスマートでシャープに: 8.5px） -->
  <path d="M 44 56 L 58 70 L 84 38" fill="none" stroke="#FFFFFF" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round" />
</svg>