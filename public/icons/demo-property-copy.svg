<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- 洗練されたモダンなオレンジの背景 -->
  <rect x="0" y="0" width="100" height="100" rx="24" fill="#F05A28" />

  <!-- 3枚の重なりによる「量産・コピー」のビジュアル表現 -->
  <g fill="#FFFFFF">
    <!-- 3枚目（一番奥・不透明度40%） -->
    <path d="M 38 18 C 38 16.9, 38.9 16, 40 16 L 80 16 C 81.1 16, 82 16.9, 82 18 L 82 58 C 82 59.1, 81.1 60, 80 60 L 76 60 L 76 22 C 76 20.9, 75.1 20, 74 20 L 38 20 Z" opacity="0.4" />
    
    <!-- 2枚目（真ん中・不透明度70%） -->
    <path d="M 28 28 C 28 26.9, 28.9 26, 30 26 L 70 26 C 71.1 26, 72 26.9, 72 28 L 72 68 C 72 69.1, 71.1 70, 70 70 L 66 70 L 66 32 C 66 30.9, 65.1 30, 64 30 L 28 30 Z" opacity="0.7" />
    
    <!-- 1枚目（手前・メインとなる用紙） -->
    <rect x="18" y="36" width="42" height="42" rx="6" />
    
    <!-- 物件（家）のマーク（背景色と同じオレンジでくり抜き） -->
    <path d="M 39 44 L 27 54 L 31 54 L 31 64 L 47 64 L 47 54 L 51 54 Z M 39 52 C 37.3 52, 36 50.7, 36 49 C 36 47.3, 37.3 46, 39 46 C 40.7 46, 42 47.3, 42 49 C 42 50.7, 40.7 52, 39 52 Z" fill="#F05A28" />
    
    <!-- テキスト・広告コピーのライン（背景色と同じオレンジでくり抜き） -->
    <rect x="25" y="69" width="28" height="4" rx="2" fill="#F05A28" />
  </g>
</svg>